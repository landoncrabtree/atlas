# Atlas default keymap (Windows).
# Copy this file to override defaults; add new [[bindings]] entries or
# suppress a default by setting its `action` to an empty string.
#
# Modifier aliases: cmd|meta|super|win, alt|option|opt, ctrl|control, shift.
# The keymap is literal — a binding for `cmd-c` requires the physical
# Cmd key on macOS or physical Super/Meta on Linux/Windows. If you want
# the same shortcut on every platform, use `ctrl-*`.

# [Global] Toggle Command Palette
[[bindings]]
context = "Global"
key = "ctrl-shift-p"
action = "command_palette::Toggle"

# [Global] Go to Anything
[[bindings]]
context = "Global"
key = "ctrl-p"
action = "goto::Anything"

# [Global] Open Settings
[[bindings]]
context = "Global"
key = "ctrl-,"
action = "app::OpenSettings"

# [Global] Quit Atlas
[[bindings]]
context = "Global"
key = "ctrl-q"
action = "app::Quit"

# [Pane] Move Down
[[bindings]]
context = "Pane"
key = "j"
action = "pane::MoveDown"

# [Pane] Move Up
[[bindings]]
context = "Pane"
key = "k"
action = "pane::MoveUp"

# [Pane] Go Up (Parent Directory)
