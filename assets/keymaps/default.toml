# Atlas default keymap.
# Copy this file to override defaults; add new [[bindings]] entries or
# suppress a default by setting its `action` to an empty string.
#
# Modifier aliases: cmd|meta|super|win, alt|option|opt, ctrl|control, shift.
# Cross-platform note: `cmd` maps to Cmd on macOS, Ctrl on Linux/Windows.

# [Global] Toggle Command Palette
[[bindings]]
context = "Global"
key = "shift-cmd-p"
action = "command_palette::Toggle"

# [Global] Go to Anything
[[bindings]]
context = "Global"
key = "cmd-p"
action = "goto::Anything"

# [Global] Open Settings
[[bindings]]
context = "Global"
key = "cmd-,"
action = "app::OpenSettings"

# [Global] Quit Atlas
[[bindings]]
context = "Global"
key = "cmd-q"
action = "app::Quit"

# [Pane] Move Down
[[bindings]]
context = "Pane"
key = "j"
action = "pane::MoveDown"

# [Pane] Move Up
[[bindings]]
context = "Pane"
key = "k"
action = "pane::MoveUp"

# [Pane] Move Left
[[bindings]]
context = "Pane"
key = "h"
action = "pane::MoveLeft"

# [Pane] Move Right
[[bindings]]
context = "Pane"
key = "l"
action = "pane::MoveRight"

# [Pane] Move to Top
[[bindings]]
context = "Pane"
key = "g g"
action = "pane::MoveToTop"

# [Pane] Move to Bottom
[[bindings]]
context = "Pane"
key = "shift-g"
action = "pane::MoveToBottom"

# [Pane] Search in Place
[[bindings]]
context = "Pane"
key = "/"
action = "pane::SearchInPlace"

# [Pane] Activate
[[bindings]]
context = "Pane"
key = "enter"
action = "pane::Activate"

# [Pane] Go Up (Parent Directory)
[[bindings]]
context = "Pane"
key = "backspace"
action = "pane::GoUp"

# [Pane] Navigate Back
[[bindings]]
context = "Pane"
key = "alt-left"
action = "pane::Back"

# [Pane] Navigate Forward
[[bindings]]
context = "Pane"
key = "alt-right"
action = "pane::Forward"

# [Pane] Toggle Selection
[[bindings]]
context = "Pane"
key = "space"
action = "pane::ToggleSelection"

# [Pane] Select All
