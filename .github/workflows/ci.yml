name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    # One job per OS runs clippy + test back-to-back and shares a
    # single incremental target/ dir. The dedicated `build` job that
    # used to sit alongside was dropped: `cargo test --workspace`
    # already compiles every workspace member (dev profile), and
    # `crates/atlas-ui/tests/font_bundle.rs::release_binary_embeds_the_bundled_ttf`
    # invokes `cargo build --release --bin atlas` internally — so the
    # release profile is exercised as a side effect of `cargo test`
    # on every OS in the matrix.
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-render0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxkbcommon-x11-dev \
            libwayland-dev
      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache per OS. `cargo clippy` (check mode) and
          # `cargo test` (build + run) share this target dir, so the
          # second command is mostly incremental.
          key: ${{ matrix.os }}
      - name: Set MOCK_SERVERS_SKIP on non-Linux
        # Python mock servers (paramiko / pyftpdlib / wsgidav / moto)
        # depend on host Python + `uv` which we only provision on the
        # Linux runner. On macOS + Windows we short-circuit the
        # remote-fs integration tests via this env var — see
        # crates/atlas-remote/tests/common/mock.rs.
        if: runner.os != 'Linux'
        run: echo "MOCK_SERVERS_SKIP=1" >> $GITHUB_ENV
        shell: bash
      - name: Install uv (Linux only, for remote-fs mock servers)
        if: runner.os == 'Linux'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
