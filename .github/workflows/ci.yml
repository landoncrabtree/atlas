name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    # One job per OS runs clippy + test back-to-back and shares a
    # single incremental target/ dir. `cargo test --workspace` already
    # compiles every workspace member (dev profile), and
    # `crates/atlas-ui/tests/font_bundle.rs::release_binary_embeds_the_bundled_ttf`
    # byte-scans an already-built rlib — so no separate build step is
    # needed.
    #
    # `windows-latest` is deliberately absent from the matrix: Unix is
    # the priority for MVP, and Windows-only test failures need a real
    # Windows machine to root-cause (GitHub-hosted runners can't
    # provide interactive debugging, and Windows Defender AV on the
    # runner's temp-file paths adds enough latency to make timing-
    # sensitive tests flake in ways that can't be reproduced locally
    # on macOS). Re-add `windows-latest` once the app is validated on
    # a real Windows dev box. See `.github/instructions/architecture.instructions.md`.
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-render0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxkbcommon-x11-dev \
            libwayland-dev
      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache per OS. `cargo clippy` (check mode) and
          # `cargo test` (build + run) share this target dir, so the
          # second command is mostly incremental.
          key: ${{ matrix.os }}
      - name: Set MOCK_SERVERS_SKIP on non-Linux
        # Python mock servers (paramiko / pyftpdlib / wsgidav / moto)
        # depend on host Python + `uv` which we only provision on the
        # Linux runner. On macOS + Windows we short-circuit the
        # remote-fs integration tests via this env var — see
        # crates/atlas-remote/tests/common/mock.rs.
        if: runner.os != 'Linux'
        run: echo "MOCK_SERVERS_SKIP=1" >> $GITHUB_ENV
        shell: bash
      - name: Install uv (Linux only, for remote-fs mock servers)
        if: runner.os == 'Linux'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install cargo-nextest
        # nextest is significantly faster than `cargo test` (parallel
        # binary execution, per-test timeout, retry-on-flake) and is
        # the recommended runner for CI. Retries let us tolerate the
        # documented FSEvents-timing flakies on macOS runners
        # (`theming::watcher`, `views::miller::controller`,
        # `atlas-watch::test_*`, `atlas-config::watcher_reload_and_error`)
        # without silencing them via `#[ignore]`. See
        # `.github/skills/testing/SKILL.md`.
        uses: taiki-e/install-action@nextest
      - name: Clippy (continue on failure to surface all issues)
        id: clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Run tests (nextest, retry-on-flake, no-fail-fast)
        id: tests
        # `--no-fail-fast` runs every test binary even after one crate's
        # tests fail — surfaces the full list of cross-platform issues
        # in one CI cycle instead of the back-and-forth of fix-one → CI →
        # fix-next → CI. `continue-on-error: true` keeps the workflow
        # running so sibling steps (doctests) + sibling jobs (Windows /
        # Linux) surface their own failures in the same cycle. The
        # aggregate step at the end still fails the job.
        # TODO: remove `--no-fail-fast` + `continue-on-error` once the
        # CI matrix has been green for a full sprint.
        continue-on-error: true
        run: cargo nextest run --workspace --locked --retries 3 --no-fail-fast
      - name: Run doctests
        id: doctests
        # nextest doesn't run doctests yet (upstream issue).
        # Keep them under plain `cargo test --doc`.
        continue-on-error: true
        run: cargo test --doc --workspace --locked --no-fail-fast
      - name: Fail job if any prior step failed
        # Aggregate exit code across the tolerant steps above so the
        # full log surfaces in ONE cycle, but the job still fails when
        # anything went wrong. Sorted by likelihood of noise: clippy
        # first (usually surfaces first), then tests, then doctests.
        run: |
          echo "clippy outcome:   ${{ steps.clippy.outcome }}"
          echo "tests outcome:    ${{ steps.tests.outcome }}"
          echo "doctests outcome: ${{ steps.doctests.outcome }}"
          if [ "${{ steps.clippy.outcome }}" != "success" ] \
              || [ "${{ steps.tests.outcome }}" != "success" ] \
              || [ "${{ steps.doctests.outcome }}" != "success" ]; then
            echo "::error::One or more prior steps failed — see logs above."
            exit 1
          fi
        shell: bash

  perf-check:
    # Informational only — publishes the criterion bench results as an
    # artifact so a maintainer can pull the raw report and eyeball for
    # regressions between PRs. Deliberately NOT a gating check:
    # criterion medians are runner-dependent and would produce noisy
    # merge blocks. See `.github/skills/write-benches/SKILL.md` for how to
    # interpret.
    name: perf-check (informational)
    runs-on: ubuntu-latest
    # Only run on PRs — on push-to-main this would double-run against
    # the same commit for no signal gain.
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libfontconfig1-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: perf-check
      - name: Run criterion benches with a short sample size
        # Criterion 0.5's default runner accepts `--sample-size`, not
        # `--profile-time`. Keep this informational job short enough to
        # catch large regressions without turning runner variance into a
        # gating signal.
        run: |
          cargo bench -p atlas-fs --benches -- --sample-size 10
          cargo bench -p atlas-search --benches -- --sample-size 10
          cargo bench -p atlas-ops --benches -- --sample-size 10
      - name: Upload criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: target/criterion/
          if-no-files-found: warn
          retention-days: 14
