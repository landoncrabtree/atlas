name: release

# Tag-based releases: push `git tag v0.4.0 && git push --tags`, and this
# workflow builds signed macOS bundles + Windows exe + Linux binary and
# publishes them to a GitHub Release named after the tag.
#
# `workflow_dispatch` also runs the build pipeline manually (via the
# Actions UI "Run workflow" button) but does NOT publish a GitHub
# Release — the artifacts are attached to the workflow run instead.
# Use this to sanity-check the pipeline without creating a public
# release entry.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Only create a GitHub Release on tag pushes; manual runs just leave
  # artifacts on the workflow run for download.
  PUBLISH_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-macos:
    name: build (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos

      - name: Build app bundle
        run: dist/build-app.sh

      - name: Sign (if credentials present)
        if: env.ATLAS_SIGNING_IDENTITY != ''
        env:
          ATLAS_SIGNING_IDENTITY: ${{ secrets.ATLAS_SIGNING_IDENTITY }}
        run: dist/sign.sh

      - name: Build DMG
        run: dist/build-dmg.sh

      - name: Notarize (if credentials present)
        if: env.ATLAS_NOTARY_PROFILE != ''
        env:
          ATLAS_NOTARY_PROFILE: ${{ secrets.ATLAS_NOTARY_PROFILE }}
        run: dist/notarize.sh

      - name: Zip .app bundle
        run: cd target/dist && zip -r Atlas-macos.app.zip Atlas.app

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-macos-dmg
          path: target/dist/*.dmg

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-macos-app
          path: target/dist/Atlas-macos.app.zip

  build-linux:
    name: build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-render0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxkbcommon-x11-dev \
            libwayland-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-linux

      - name: Build release binary
        run: cargo build --release --bin atlas --locked

      - name: Package tarball
        run: |
          mkdir -p target/dist
          cp target/release/atlas target/dist/atlas
          cp README.md LICENSE 2>/dev/null target/dist/ || true
          cd target/dist
          tar czf atlas-linux-x86_64.tar.gz atlas $(ls README.md LICENSE 2>/dev/null || true)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-linux
          path: target/dist/atlas-linux-x86_64.tar.gz

  build-windows:
    name: build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-windows

      - name: Build release binary
        run: cargo build --release --bin atlas --locked

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\dist | Out-Null
          Copy-Item target\release\atlas.exe target\dist\atlas.exe
          if (Test-Path README.md) { Copy-Item README.md target\dist\ }
          if (Test-Path LICENSE)   { Copy-Item LICENSE   target\dist\ }
          Compress-Archive -Path target\dist\* -DestinationPath target\dist\atlas-windows-x86_64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-windows
          path: target/dist/atlas-windows-x86_64.zip

  publish:
    name: publish GitHub Release
    needs: [build-macos, build-linux, build-windows]
    # Only publish on tag pushes. Manual `workflow_dispatch` runs
    # complete the build matrix and leave artifacts on the run page,
    # but skip this job so no release entry is created.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into one dir
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.tar.gz' \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
